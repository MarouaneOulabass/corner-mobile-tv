<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corner Mobile — Display</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00f0ff">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="icon" href="icons/icon-192.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;700;900&family=Inter:wght@300;400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    cursor: none;
  }

  /* ── Canvas layers ── */
  #bgCanvas, #circuitCanvas, #particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #bgCanvas { z-index: 0; }
  #circuitCanvas { z-index: 1; opacity: 0.3; }
  #particleCanvas { z-index: 2; }

  /* ── Main content ── */
  .content {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Logo area ── */
  .logo-container {
    position: relative;
    margin-bottom: 20px;
    animation: float 6s ease-in-out infinite;
  }

  .logo-icon {
    width: 100px;
    height: 100px;
    margin: 0 auto 10px;
    position: relative;
  }

  .logo-icon .phone-outline {
    width: 60px;
    height: 100px;
    border: 3px solid #00f0ff;
    border-radius: 14px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.1);
    animation: phonePulse 3s ease-in-out infinite;
  }

  .logo-icon .phone-outline::after {
    content: '';
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 20px;
    height: 3px;
    background: #00f0ff;
    border-radius: 2px;
    box-shadow: 0 0 10px #00f0ff;
  }

  .logo-icon .phone-outline::before {
    content: '';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 3px;
    background: #00f0ff;
    border-radius: 2px;
    box-shadow: 0 0 10px #00f0ff;
    opacity: 0.6;
  }

  .logo-icon .wrench {
    position: absolute;
    bottom: -5px;
    right: -15px;
    font-size: 32px;
    transform: rotate(-30deg);
    filter: drop-shadow(0 0 8px rgba(255, 100, 50, 0.8));
    animation: wrenchSwing 4s ease-in-out infinite;
  }

  .store-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 72px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #00f0ff, #7b2fff, #ff2d95);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradientShift 4s ease-in-out infinite;
    text-shadow: none;
    position: relative;
  }

  .store-name::after {
    content: 'CORNER MOBILE';
    position: absolute;
    top: 0; left: 0;
    z-index: -1;
    font-family: 'Orbitron', sans-serif;
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 12px;
    -webkit-text-fill-color: transparent;
    -webkit-text-stroke: 1px rgba(0, 240, 255, 0.15);
    filter: blur(4px);
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 8px;
    color: rgba(255, 255, 255, 0.5);
    text-transform: uppercase;
    margin-top: 5px;
  }

  .location-badge {
    margin-top: 8px;
    padding: 6px 24px;
    border: 1px solid rgba(0, 240, 255, 0.2);
    border-radius: 30px;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(0, 240, 255, 0.6);
    text-transform: uppercase;
    background: rgba(0, 240, 255, 0.03);
  }

  /* ── Welcome carousel ── */
  .welcome-section {
    margin-top: 40px;
    text-align: center;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .welcome-text {
    font-size: 52px;
    font-weight: 700;
    opacity: 0;
    position: absolute;
    transition: all 1s ease;
    white-space: nowrap;
  }

  .welcome-text.active {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .welcome-text.exit-up {
    opacity: 0;
    transform: translateY(-40px) scale(0.95);
  }

  .welcome-text.enter-down {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }

  .welcome-fr {
    font-family: 'Inter', sans-serif;
    color: #ffffff;
    text-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
  }

  .welcome-ar {
    font-family: 'Cairo', sans-serif;
    font-size: 60px;
    color: #ffffff;
    text-shadow: 0 0 40px rgba(123, 47, 255, 0.5);
    direction: rtl;
  }

  .welcome-darija {
    font-family: 'Cairo', sans-serif;
    font-size: 48px;
    color: #ffffff;
    text-shadow: 0 0 40px rgba(255, 45, 149, 0.4);
    direction: rtl;
  }

  /* ── Services showcase ── */
  .services-bar {
    position: fixed;
    bottom: 50px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 60px;
    z-index: 10;
  }

  .service-item {
    text-align: center;
    opacity: 0;
    transform: translateY(30px);
    animation: serviceAppear 0.8s ease forwards;
  }

  .service-icon {
    font-size: 40px;
    margin-bottom: 10px;
    display: block;
    filter: drop-shadow(0 0 15px rgba(0, 240, 255, 0.6));
    animation: iconBounce 3s ease-in-out infinite;
  }

  .service-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.7);
  }

  .service-detail {
    font-size: 11px;
    color: rgba(0, 240, 255, 0.5);
    margin-top: 4px;
    letter-spacing: 2px;
  }

  /* ── Glitch effect on name ── */
  .glitch-layer {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    z-index: 15;
    pointer-events: none;
    opacity: 0;
  }

  .glitch-layer.active {
    animation: glitchFlash 0.15s ease;
  }

  /* ── Scanning line ── */
  .scan-line {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
    z-index: 20;
    animation: scanDown 8s linear infinite;
    pointer-events: none;
  }

  /* ── Corner decorations ── */
  .corner-deco {
    position: fixed;
    width: 60px;
    height: 60px;
    border-color: rgba(0, 240, 255, 0.3);
    border-style: solid;
    z-index: 10;
  }
  .corner-deco.tl { top: 30px; left: 30px; border-width: 2px 0 0 2px; }
  .corner-deco.tr { top: 30px; right: 30px; border-width: 2px 2px 0 0; }
  .corner-deco.bl { bottom: 30px; left: 30px; border-width: 0 0 2px 2px; }
  .corner-deco.br { bottom: 30px; right: 30px; border-width: 0 2px 2px 0; }

  /* ── Floating phone showcase ── */
  .phone-showcase {
    position: fixed;
    z-index: 5;
    opacity: 0;
    transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }

  .phone-showcase.visible {
    opacity: 1;
  }

  .phone-3d {
    width: 120px;
    height: 220px;
    border: 2px solid rgba(0, 240, 255, 0.4);
    border-radius: 20px;
    background: linear-gradient(145deg, rgba(0, 240, 255, 0.05), rgba(123, 47, 255, 0.05));
    position: relative;
    animation: phoneFloat 5s ease-in-out infinite;
    box-shadow: 0 0 30px rgba(0, 240, 255, 0.15),
                inset 0 0 30px rgba(0, 240, 255, 0.05);
  }

  .phone-3d .screen {
    position: absolute;
    top: 15px; left: 8px; right: 8px; bottom: 15px;
    border-radius: 10px;
    overflow: hidden;
    background: linear-gradient(180deg, #0a0a1a, #1a0a2e);
  }

  .phone-3d .screen-content {
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, #00f0ff22, #7b2fff22, #ff2d9522);
    background-size: 400% 400%;
    animation: gradientShift 3s ease infinite;
  }

  .phone-brand {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', sans-serif;
    font-size: 11px;
    color: rgba(0, 240, 255, 0.6);
    letter-spacing: 3px;
    white-space: nowrap;
  }

  /* ── Promo banner ── */
  .promo-strip {
    position: fixed;
    top: 30px;
    right: 100px;
    z-index: 12;
    padding: 8px 20px;
    border: 1px solid rgba(255, 45, 149, 0.4);
    border-radius: 4px;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    color: #ff2d95;
    background: rgba(255, 45, 149, 0.05);
    animation: promoPulse 2s ease-in-out infinite;
  }

  /* ── Keyframes ── */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  @keyframes phonePulse {
    0%, 100% { box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 20px rgba(0, 240, 255, 0.1); }
    50% { box-shadow: 0 0 40px rgba(0, 240, 255, 0.8), inset 0 0 40px rgba(0, 240, 255, 0.2); }
  }

  @keyframes wrenchSwing {
    0%, 100% { transform: rotate(-30deg); }
    25% { transform: rotate(-20deg); }
    75% { transform: rotate(-40deg); }
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  @keyframes scanDown {
    0% { top: -2px; }
    100% { top: 100%; }
  }

  @keyframes serviceAppear {
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes iconBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  @keyframes phoneFloat {
    0%, 100% { transform: translateY(0) rotateY(0deg); }
    50% { transform: translateY(-20px) rotateY(5deg); }
  }

  @keyframes glitchFlash {
    0% { opacity: 0; }
    20% { opacity: 1; background: rgba(0, 240, 255, 0.03); }
    40% { opacity: 0; }
    60% { opacity: 1; background: rgba(255, 45, 149, 0.02); }
    100% { opacity: 0; }
  }

  @keyframes promoPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  @keyframes revealUp {
    from { opacity: 0; transform: translateY(60px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Intro sequence ── */
  .intro-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #0a0a0f;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.5s ease;
  }

  .intro-overlay.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .intro-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 28px;
    letter-spacing: 20px;
    color: #00f0ff;
    opacity: 0;
    animation: introReveal 2s ease 0.5s forwards;
  }

  @keyframes introReveal {
    0% { opacity: 0; letter-spacing: 40px; }
    50% { opacity: 1; }
    100% { opacity: 1; letter-spacing: 20px; }
  }

  /* ── Repair spark effect ── */
  .spark-container {
    position: fixed;
    z-index: 8;
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Canvases -->
<canvas id="bgCanvas"></canvas>
<canvas id="circuitCanvas"></canvas>
<canvas id="particleCanvas"></canvas>

<!-- Scan line -->
<div class="scan-line"></div>

<!-- Corner decorations -->
<div class="corner-deco tl"></div>
<div class="corner-deco tr"></div>
<div class="corner-deco bl"></div>
<div class="corner-deco br"></div>

<!-- Glitch layer -->
<div class="glitch-layer" id="glitchLayer"></div>

<!-- Promo strip -->
<div class="promo-strip" id="promoStrip">SMARTPHONES &bull; ACCESSOIRES &bull; R&Eacute;PARATION</div>

<!-- Main content -->
<div class="content" id="mainContent" style="opacity:0">
  <div class="logo-container">
    <div class="logo-icon">
      <div class="phone-outline"></div>
      <span class="wrench">&#128295;</span>
    </div>
    <div class="store-name">CORNER MOBILE</div>
    <div class="tagline">Your Tech &bull; Your Style &bull; Your Corner</div>
    <div class="location-badge">&#128205; Rabat &mdash; Maroc</div>
  </div>

  <div class="welcome-section" id="welcomeSection">
    <!-- Welcome messages cycle here -->
  </div>
</div>

<!-- Services bar -->
<div class="services-bar" id="servicesBar">
  <div class="service-item" style="animation-delay: 0.2s">
    <span class="service-icon">&#128241;</span>
    <div class="service-label">Smartphones</div>
    <div class="service-detail">Derniers mod&egrave;les</div>
  </div>
  <div class="service-item" style="animation-delay: 0.5s">
    <span class="service-icon">&#128295;</span>
    <div class="service-label">R&eacute;paration</div>
    <div class="service-detail">Express &bull; Expert</div>
  </div>
  <div class="service-item" style="animation-delay: 0.8s">
    <span class="service-icon">&#127911;</span>
    <div class="service-label">Accessoires</div>
    <div class="service-detail">Premium quality</div>
  </div>
  <div class="service-item" style="animation-delay: 1.1s">
    <span class="service-icon">&#128171;</span>
    <div class="service-label">Protection</div>
    <div class="service-detail">Coques &bull; Films</div>
  </div>
  <div class="service-item" style="animation-delay: 1.4s">
    <span class="service-icon">&#9889;</span>
    <div class="service-label">Chargeurs</div>
    <div class="service-detail">Fast charge</div>
  </div>
</div>

<!-- Floating phones -->
<div class="phone-showcase" id="phone1" style="left: 8%; top: 25%;">
  <div class="phone-3d">
    <div class="screen"><div class="screen-content"></div></div>
  </div>
  <div class="phone-brand">SAMSUNG</div>
</div>

<div class="phone-showcase" id="phone2" style="right: 8%; top: 20%;">
  <div class="phone-3d">
    <div class="screen"><div class="screen-content"></div></div>
  </div>
  <div class="phone-brand">iPHONE</div>
</div>

<div class="phone-showcase" id="phone3" style="left: 5%; bottom: 20%;">
  <div class="phone-3d" style="width:100px; height:180px;">
    <div class="screen"><div class="screen-content"></div></div>
  </div>
  <div class="phone-brand">XIAOMI</div>
</div>

<div class="phone-showcase" id="phone4" style="right: 5%; bottom: 22%;">
  <div class="phone-3d" style="width:100px; height:180px;">
    <div class="screen"><div class="screen-content"></div></div>
  </div>
  <div class="phone-brand">OPPO</div>
</div>

<!-- Intro overlay -->
<div class="intro-overlay" id="introOverlay">
  <div class="intro-text">INITIALIZING&hellip;</div>
</div>

<script>
// ════════════════════════════════════════
// 1. BACKGROUND — Deep space gradient
// ════════════════════════════════════════
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener('resize', resizeBg);

let bgHue = 0;
function drawBg() {
  bgHue += 0.1;
  const g = bgCtx.createRadialGradient(
    bgCanvas.width / 2, bgCanvas.height / 2, 0,
    bgCanvas.width / 2, bgCanvas.height / 2, bgCanvas.width * 0.8
  );
  g.addColorStop(0, `hsl(${220 + Math.sin(bgHue * 0.01) * 20}, 60%, 8%)`);
  g.addColorStop(0.5, `hsl(${260 + Math.sin(bgHue * 0.015) * 15}, 50%, 5%)`);
  g.addColorStop(1, '#0a0a0f');
  bgCtx.fillStyle = g;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
  requestAnimationFrame(drawBg);
}
drawBg();

// ════════════════════════════════════════
// 2. CIRCUIT BOARD pattern
// ════════════════════════════════════════
const circuitCanvas = document.getElementById('circuitCanvas');
const cCtx = circuitCanvas.getContext('2d');

function resizeCircuit() {
  circuitCanvas.width = window.innerWidth;
  circuitCanvas.height = window.innerHeight;
}
resizeCircuit();
window.addEventListener('resize', resizeCircuit);

class CircuitLine {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * circuitCanvas.width;
    this.y = Math.random() * circuitCanvas.height;
    this.length = 30 + Math.random() * 80;
    this.dir = Math.floor(Math.random() * 4); // 0=right,1=down,2=left,3=up
    this.speed = 0.5 + Math.random() * 1.5;
    this.progress = 0;
    this.color = ['#00f0ff', '#7b2fff', '#ff2d95'][Math.floor(Math.random() * 3)];
    this.width = 1 + Math.random();
    this.done = false;
  }
  update() {
    this.progress += this.speed;
    if (this.progress >= this.length) {
      if (Math.random() < 0.4) {
        // Turn
        this.dir = (this.dir + (Math.random() < 0.5 ? 1 : 3)) % 4;
        this.progress = 0;
        this.length = 20 + Math.random() * 60;
      } else {
        this.done = true;
      }
    }
  }
  draw() {
    const dx = [1, 0, -1, 0][this.dir];
    const dy = [0, 1, 0, -1][this.dir];
    const ex = this.x + dx * this.progress;
    const ey = this.y + dy * this.progress;
    cCtx.beginPath();
    cCtx.moveTo(this.x, this.y);
    cCtx.lineTo(ex, ey);
    cCtx.strokeStyle = this.color;
    cCtx.lineWidth = this.width;
    cCtx.shadowColor = this.color;
    cCtx.shadowBlur = 6;
    cCtx.stroke();
    // Node dot
    cCtx.beginPath();
    cCtx.arc(ex, ey, 2, 0, Math.PI * 2);
    cCtx.fillStyle = this.color;
    cCtx.fill();
  }
}

const circuits = [];
for (let i = 0; i < 25; i++) circuits.push(new CircuitLine());

function drawCircuits() {
  cCtx.clearRect(0, 0, circuitCanvas.width, circuitCanvas.height);
  circuits.forEach((c, i) => {
    c.update();
    c.draw();
    if (c.done) c.reset();
  });
  requestAnimationFrame(drawCircuits);
}
drawCircuits();

// ════════════════════════════════════════
// 3. PARTICLE system
// ════════════════════════════════════════
const pCanvas = document.getElementById('particleCanvas');
const pCtx = pCanvas.getContext('2d');

function resizeParticles() {
  pCanvas.width = window.innerWidth;
  pCanvas.height = window.innerHeight;
}
resizeParticles();
window.addEventListener('resize', resizeParticles);

class Particle {
  constructor() {
    this.x = Math.random() * pCanvas.width;
    this.y = Math.random() * pCanvas.height;
    this.vx = (Math.random() - 0.5) * 0.5;
    this.vy = (Math.random() - 0.5) * 0.5;
    this.size = Math.random() * 2.5;
    this.alpha = Math.random() * 0.5 + 0.1;
    this.color = ['#00f0ff', '#7b2fff', '#ff2d95', '#ffffff'][Math.floor(Math.random() * 4)];
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0) this.x = pCanvas.width;
    if (this.x > pCanvas.width) this.x = 0;
    if (this.y < 0) this.y = pCanvas.height;
    if (this.y > pCanvas.height) this.y = 0;
  }
  draw() {
    pCtx.beginPath();
    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    pCtx.fillStyle = this.color;
    pCtx.globalAlpha = this.alpha;
    pCtx.shadowColor = this.color;
    pCtx.shadowBlur = 10;
    pCtx.fill();
    pCtx.globalAlpha = 1;
  }
}

const particles = [];
for (let i = 0; i < 80; i++) particles.push(new Particle());

function drawParticles() {
  pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
  // Connect nearby particles
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        pCtx.beginPath();
        pCtx.moveTo(particles[i].x, particles[i].y);
        pCtx.lineTo(particles[j].x, particles[j].y);
        pCtx.strokeStyle = `rgba(0, 240, 255, ${0.08 * (1 - dist / 150)})`;
        pCtx.lineWidth = 0.5;
        pCtx.stroke();
      }
    }
  }
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ════════════════════════════════════════
// 4. WELCOME messages carousel
// ════════════════════════════════════════
const welcomeMessages = [
  { text: 'Bienvenue', class: 'welcome-fr' },
  { text: 'مرحباً', class: 'welcome-ar' },
  { text: 'Welcome', class: 'welcome-fr' },
  { text: 'مرحبا بيك', class: 'welcome-darija' },
  { text: 'Bienvenido', class: 'welcome-fr' },
  { text: 'أهلاً وسهلاً', class: 'welcome-ar' },
];

const welcomeSection = document.getElementById('welcomeSection');
let currentWelcome = 0;
let welcomeEl = null;

function showWelcome() {
  if (welcomeEl) {
    welcomeEl.classList.remove('active');
    welcomeEl.classList.add('exit-up');
    const old = welcomeEl;
    setTimeout(() => old.remove(), 1000);
  }

  const msg = welcomeMessages[currentWelcome];
  welcomeEl = document.createElement('div');
  welcomeEl.className = `welcome-text ${msg.class} enter-down`;
  welcomeEl.textContent = msg.text;
  welcomeSection.appendChild(welcomeEl);

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      welcomeEl.classList.remove('enter-down');
      welcomeEl.classList.add('active');
    });
  });

  currentWelcome = (currentWelcome + 1) % welcomeMessages.length;
}

// ════════════════════════════════════════
// 5. GLITCH effect
// ════════════════════════════════════════
const glitchLayer = document.getElementById('glitchLayer');
function triggerGlitch() {
  glitchLayer.classList.add('active');
  setTimeout(() => glitchLayer.classList.remove('active'), 150);
}
setInterval(triggerGlitch, 5000 + Math.random() * 5000);

// ════════════════════════════════════════
// 6. PHONE showcase animation
// ════════════════════════════════════════
const phones = ['phone1', 'phone2', 'phone3', 'phone4'];
let currentPhone = 0;

function cyclePhones() {
  // Hide all
  phones.forEach(id => document.getElementById(id).classList.remove('visible'));
  // Show two at a time
  document.getElementById(phones[currentPhone]).classList.add('visible');
  document.getElementById(phones[(currentPhone + 1) % phones.length]).classList.add('visible');
  currentPhone = (currentPhone + 2) % phones.length;
}

// ════════════════════════════════════════
// 7. SPARK repair effect
// ════════════════════════════════════════
function createSpark() {
  const container = document.createElement('div');
  container.className = 'spark-container';
  container.style.left = (10 + Math.random() * 80) + '%';
  container.style.top = (10 + Math.random() * 80) + '%';
  document.body.appendChild(container);

  for (let i = 0; i < 8; i++) {
    const spark = document.createElement('div');
    const angle = Math.random() * Math.PI * 2;
    const dist = 20 + Math.random() * 40;
    spark.style.cssText = `
      position: absolute;
      width: 3px; height: 3px;
      background: ${Math.random() > 0.5 ? '#ff9f43' : '#ffdd57'};
      border-radius: 50%;
      box-shadow: 0 0 6px #ff9f43;
      transition: all 0.6s ease-out;
      opacity: 1;
    `;
    container.appendChild(spark);
    requestAnimationFrame(() => {
      spark.style.transform = `translate(${Math.cos(angle) * dist}px, ${Math.sin(angle) * dist}px)`;
      spark.style.opacity = '0';
    });
  }
  setTimeout(() => container.remove(), 800);
}
setInterval(createSpark, 4000);

// ════════════════════════════════════════
// 8. PROMO text rotation
// ════════════════════════════════════════
const promoTexts = [
  'SMARTPHONES \u2022 ACCESSOIRES \u2022 R\u00c9PARATION',
  '\ud83d\udd27 R\u00c9PARATION EXPRESS \u2022 TOUTES MARQUES',
  '\ud83d\udcf1 DERNIERS MOD\u00c8LES DISPONIBLES',
  '\u26a1 ACCESSOIRES PREMIUM',
  '\ud83d\udee1\ufe0f PROTECTION \u2022 COQUES \u2022 FILMS',
];
let currentPromo = 0;
const promoStrip = document.getElementById('promoStrip');

function cyclePromo() {
  promoStrip.style.opacity = '0';
  setTimeout(() => {
    currentPromo = (currentPromo + 1) % promoTexts.length;
    promoStrip.textContent = promoTexts[currentPromo];
    promoStrip.style.opacity = '1';
  }, 500);
}
setInterval(cyclePromo, 4000);

// ════════════════════════════════════════
// 9. INTRO sequence & start
// ════════════════════════════════════════
setTimeout(() => {
  document.getElementById('introOverlay').classList.add('fade-out');
  document.getElementById('mainContent').style.opacity = '1';
  document.getElementById('mainContent').style.transition = 'opacity 2s ease';

  // Start welcome carousel
  setTimeout(() => {
    showWelcome();
    setInterval(showWelcome, 3500);
  }, 500);

  // Start phone cycle
  setTimeout(() => {
    cyclePhones();
    setInterval(cyclePhones, 6000);
  }, 1000);

}, 3000);

// Remove intro fully
setTimeout(() => {
  const intro = document.getElementById('introOverlay');
  if (intro) intro.remove();
}, 5000);

// Register Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

</script>
