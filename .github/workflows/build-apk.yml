name: Build APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: |
          chmod +x gradlew || true
          gradle wrapper || true
          gradle assembleDebug

      - name: Sign APK (self-signed for sideload)
        run: |
          # Generate a keystore
          keytool -genkey -v -keystore corner-mobile.keystore \
            -alias corner -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cornermobile -keypass cornermobile \
            -dname "CN=Corner Mobile, OU=Mobile, O=Corner Mobile, L=Rabat, ST=Rabat, C=MA"

          # Find and sign the APK
          APK_PATH=$(find app/build -name "*.apk" -type f | head -1)

          # Use apksigner if available, otherwise jarsigner
          if command -v apksigner &> /dev/null; then
            apksigner sign --ks corner-mobile.keystore \
              --ks-pass pass:cornermobile \
              --ks-key-alias corner \
              --key-pass pass:cornermobile \
              --out corner-mobile-tv.apk "$APK_PATH"
          else
            cp "$APK_PATH" corner-mobile-tv.apk
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore corner-mobile.keystore \
              -storepass cornermobile -keypass cornermobile \
              corner-mobile-tv.apk corner
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: corner-mobile-tv
          path: corner-mobile-tv.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Corner Mobile TV v1.0.${{ github.run_number }}
          body: |
            ## Corner Mobile TV Display
            APK installable pour TV Xiaomi / Android TV.

            ### Installation
            1. Télécharger `corner-mobile-tv.apk`
            2. Copier sur clé USB
            3. Brancher sur la TV
            4. Installer via gestionnaire de fichiers
          files: corner-mobile-tv.apk
          generate_release_notes: false
